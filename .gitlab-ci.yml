stages:
  - build
  - release

# Only create pipelines for main branch, tags, and merge requests
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
    - if: $CI_MERGE_REQUEST_ID
    - when: never

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo   # Keep cargo cache inside the project

cache:
  key: ${CI_COMMIT_REF_SLUG}             # Cache per branch/tag
  paths:
    - target/
    - .cargo/registry/                   # Relative path, always present after build

# Build the release ZIP (for main branch or tags)
build_release:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
    - chmod +x pack.sh
  script:
    - bash pack.sh release
  artifacts:
    paths:
      - com.glmagalhaes.ulanzi.d200.zip
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Debug build (only for merge requests)
build_debug:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
    - chmod +x pack.sh
  script:
    - bash pack.sh debug
  artifacts:
    paths:
      - rs-ulanzi-d200-debug.zip
    expire_in: 1 week
  rules:
    - if: $CI_MERGE_REQUEST_ID

# Create a GitLab Release and attach the plugin ZIP as an asset (only for tags)
create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build_release
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: 'Release $CI_COMMIT_TAG'
    description: 'Automated release from GitLab CI pipeline'
    tag_name: '$CI_COMMIT_TAG'
    assets:
      links:
        - name: 'Plugin ZIP'
          url: '${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/artifacts/${CI_COMMIT_REF_NAME}/raw/com.glmagalhaes.ulanzi.d200.zip?job=build_release'
  rules:
    - if: $CI_COMMIT_TAG