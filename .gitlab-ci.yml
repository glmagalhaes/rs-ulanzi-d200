image: rust:latest

# Cache Cargo registry and build artifacts between jobs
cache:
  paths:
    - target/
    - ~/.cargo/registry

variables:
  CARGO_TERM_COLOR: always

stages:
  - build
  - release

before_script:
  - apt-get update -qq && apt-get install -y -qq zip

# Build release ZIP (on main branch and tags)
build_release:
  stage: build
  script:
    - bash ./pack.sh release
  artifacts:
    paths:
      - rs-ulanzi-d200-linux-release.zip
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# (Optional) Debug build for merge requests or other branches
build_debug:
  stage: build
  script:
    - ./pack.sh debug
  artifacts:
    paths:
      - rs-ulanzi-d200-linux-debug.zip
    expire_in: 1 week
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_TAG == null

# Create GitLab Release from the built ZIP (only on tags)
create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build_release
  script:
    - echo "Creating release for tag $CI_COMMIT_TAG"
  release:
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release from CI pipeline"
    tag_name: $CI_COMMIT_TAG
    assets:
      links:
        - name: "Plugin ZIP"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/rs-ulanzi-d200-linux-release.zip"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG
  variables:
    GIT_STRATEGY: none  # release job doesn't need the source code