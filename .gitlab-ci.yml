stages:
  - test
  - build
  - release

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

# Use job-specific cache keys to prevent cross-OS cache corruption
cache:
  key: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
  paths:
    - .cargo/
    - target/

# Run tests on default runner for all branches/MRs
test:
  stage: test
  image: rust:latest
  before_script:
    - apt-get update -yq
  script:
    - cargo test --verbose

# Base definition for build jobs that only run on beta-release tags
.build_base:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^beta-release.*$/

build:linux:amd64:
  extends: .build_base
  image: rust:latest
  tags:
    - saas-linux-small-amd64
  script:
    - rustup target add x86_64-unknown-linux-gnu
    - cargo build --release --target x86_64-unknown-linux-gnu
  artifacts:
    paths:
      - target/x86_64-unknown-linux-gnu/release/rs-ulanzi-d200-linux
    expire_in: 30 days

build:linux:arm64:
  extends: .build_base
  image: rust:latest
  tags:
    - saas-linux-small-arm64
  script:
    - rustup target add aarch64-unknown-linux-gnu
    - cargo build --release --target aarch64-unknown-linux-gnu
  artifacts:
    paths:
      - target/aarch64-unknown-linux-gnu/release/rs-ulanzi-d200-linux
    expire_in: 30 days

build:windows:amd64:
  extends: .build_base
  tags:
    - saas-windows-medium-amd64
  script:
    - rustup default stable-msvc
    - rustup target add x86_64-pc-windows-msvc
    - cargo build --release --target x86_64-pc-windows-msvc
  artifacts:
    paths:
      - target/x86_64-pc-windows-msvc/release/rs-ulanzi-d200-linux.exe
    expire_in: 30 days

build:macos:all:
  extends: .build_base
  tags:
    - saas-macos-medium-m1
  script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source "$HOME/.cargo/env"
    - rustup target add aarch64-apple-darwin
    - rustup target add x86_64-apple-darwin
    - cargo build --release --target aarch64-apple-darwin
    - cargo build --release --target x86_64-apple-darwin
  artifacts:
    paths:
      - target/aarch64-apple-darwin/release/rs-ulanzi-d200-linux
      - target/x86_64-apple-darwin/release/rs-ulanzi-d200-linux
    expire_in: 30 days

publish-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^beta-release.*$/
  needs:
    - job: build:linux:amd64
      artifacts: true
    - job: build:linux:arm64
      artifacts: true
    - job: build:windows:amd64
      artifacts: true
    - job: build:macos:all
      artifacts: true
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: 'Release $CI_COMMIT_TAG'
    description: 'Automated release for $CI_COMMIT_TAG'
    tag_name: '$CI_COMMIT_TAG'
    ref: '$CI_COMMIT_SHA'
    assets:
      links:
        - name: 'Linux x86_64 Binary'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/x86_64-unknown-linux-gnu/release/rs-ulanzi-d200-linux?job=build:linux:amd64'
        - name: 'Linux aarch64 Binary'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/aarch64-unknown-linux-gnu/release/rs-ulanzi-d200-linux?job=build:linux:arm64'
        - name: 'Windows x86_64 Binary'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/x86_64-pc-windows-msvc/release/rs-ulanzi-d200-linux.exe?job=build:windows:amd64'
        - name: 'macOS Apple Silicon (arm64) Binary'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/aarch64-apple-darwin/release/rs-ulanzi-d200-linux?job=build:macos:all'
        - name: 'macOS Intel (x86_64) Binary'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/x86_64-apple-darwin/release/rs-ulanzi-d200-linux?job=build:macos:all'