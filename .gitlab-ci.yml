stages:
  - build
  - release

build_release:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
  script:
    - bash pack.sh release
  artifacts:
    paths:
      - rs-ulanzi-d200-linux-release.zip

create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [build_release]
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    assets:
      links:
        - name: "Plugin ZIP"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/rs-ulanzi-d200-linux-release.zip"
  rules:
    - if: $CI_COMMIT_TAG