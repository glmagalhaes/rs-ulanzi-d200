publish-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^beta-release.*$/
  needs:
    - job: build:linux:amd64
      artifacts: true
    - job: build:linux:arm64
      artifacts: true
    # - job: build:windows:amd64
      # artifacts: true
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    name: 'Release $CI_COMMIT_TAG'
    description: 'Automated release for $CI_COMMIT_TAG'
    tag_name: '$CI_COMMIT_TAG'
    ref: '$CI_COMMIT_SHA'
    assets:
      links:
        - name: 'Linux x86_64 Binary'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/x86_64-unknown-linux-gnu/release/rs-ulanzi-d200-linux?job=build:linux:amd64'
        - name: 'Linux aarch64 Binary'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/aarch64-unknown-linux-gnu/release/rs-ulanzi-d200-linux?job=build:linux:arm64'
        # - name: 'Windows x86_64 Binary'
          # url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/target/x86_64-pc-windows-msvc/release/rs-ulanzi-d200-linux.exe?job=build:windows:amd64'