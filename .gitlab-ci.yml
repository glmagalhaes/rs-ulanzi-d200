stages:
  - build
  - release

variables:
  CARGO_TERM_COLOR: always

cache:
  paths:
    - target/
    - ~/.cargo/registry

# Build the release ZIP
build_release:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
    - chmod +x pack.sh
  script:
    - bash pack.sh release
  artifacts:
    paths:
      - rs-ulanzi-d200-linux-release.zip
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Debug build (optional)
build_debug:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
    - chmod +x pack.sh
  script:
    - bash pack.sh debug
  artifacts:
    paths:
      - rs-ulanzi-d200-linux-debug.zip
    expire_in: 1 week
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_TAG == null

# Create or update release using glab (supports --update)
create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build_release
  before_script:
    - apk add --no-cache git  # glab may need git for some operations
  script:
    - |
      glab release create "$CI_COMMIT_TAG" \
        --name "Release $CI_COMMIT_TAG" \
        --notes "Automated release from GitLab CI pipeline" \
        --update \
        --attach "rs-ulanzi-d200-linux-release.zip#Plugin ZIP"
  rules:
    - if: $CI_COMMIT_TAG