image: rust:latest

stages:
  - build
  - test

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cargo/
    - target/

before_script:
  - apt-get update -yq

build:
  stage: build
  image: rust:latest
  script:
    - cargo build --verbose

test:
  stage: test
  image: rust:latest
  script:
    - cargo test --verbose
