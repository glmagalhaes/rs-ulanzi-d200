stages:
  - build
  - release

variables:
  CARGO_TERM_COLOR: always

cache:
  paths:
    - target/
    - ~/.cargo/registry

build_release:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
    - chmod +x pack.sh
  script:
    - bash pack.sh release
  artifacts:
    paths:
      - rs-ulanzi-d200-linux-release.zip
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build_release
  script:
    - |
      release-cli create \
        --name "Release $CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --description "Automated release from GitLab CI pipeline" \
        --update \
        --assets-link "{\"name\":\"Plugin ZIP\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/rs-ulanzi-d200-linux-release.zip\"}"
  rules:
    - if: $CI_COMMIT_TAG