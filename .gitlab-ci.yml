stages:
  - test
  - build
  - release

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

# Use job-specific cache keys to prevent cross-OS cache corruption
cache:
  key: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
  paths:
    - .cargo/
    - target/

# Run tests on default runner for all branches/MRs
test:
  stage: test
  image: rust:latest
  before_script:
    - apt-get update -yq
  script:
    - cargo test --verbose

# Base definition for build jobs that only run on beta-release tags
.build_base:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^beta-release.*$/

build:linux:amd64:
  extends: .build_base
  image: rust:latest
  tags:
    - saas-linux-small-amd64
  script:
    - rustup target add x86_64-unknown-linux-gnu
    - cargo build --release --target x86_64-unknown-linux-gnu
  artifacts:
    paths:
      - target/x86_64-unknown-linux-gnu/release/rs-ulanzi-d200-linux
    expire_in: 30 days

build:linux:arm64:
  extends: .build_base
  image: rust:latest
  tags:
    - saas-linux-small-arm64
  script:
    - rustup target add aarch64-unknown-linux-gnu
    - cargo build --release --target aarch64-unknown-linux-gnu
  artifacts:
    paths:
      - target/aarch64-unknown-linux-gnu/release/rs-ulanzi-d200-linux
    expire_in: 30 days

