stages:
  - build
  - release

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo   # Keep cargo cache inside the project

cache:
  key: ${CI_COMMIT_REF_SLUG}             # Cache per branch/tag
  paths:
    - target/
    - .cargo/registry/                   # Now a valid relative path

# Build the release ZIP
build_release:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
    - chmod +x pack.sh
  script:
    - bash pack.sh release
  artifacts:
    paths:
      - rs-ulanzi-d200-linux-release.zip
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# Debug build (optional)
build_debug:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
    - chmod +x pack.sh
  script:
    - bash pack.sh debug
  artifacts:
    paths:
      - rs-ulanzi-d200-linux-debug.zip
    expire_in: 1 week
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_TAG == null

create_release:
  stage: release
  image: alpine/curl:latest
  needs:
    - build_release
  script:
    - |
      # Ensure the artifact is present (downloaded by `needs`)
      ls -la rs-ulanzi-d200-linux-release.zip

      # Create the release (if it doesn't exist; if it does, this call is ignored)
      curl -sS --fail-with-body --request POST \
        --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        --form "tag_name=${CI_COMMIT_TAG}" \
        --form "name=Release ${CI_COMMIT_TAG}" \
        --form "description=Automated release from GitLab CI pipeline" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

      # Attach the ZIP as a release asset link
      curl -sS --fail-with-body --request POST \
        --header "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
        --form "name=Plugin ZIP" \
        --form "url=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/artifacts/${CI_COMMIT_REF_NAME}/raw/rs-ulanzi-d200-linux-release.zip?job=build_release" \
        --form "filepath=/rs-ulanzi-d200-linux-release.zip" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}/assets/links"
  rules:
    - if: $CI_COMMIT_TAG