# This is a GitLab CI/CD configuration file for a Rust project.
# It defines a pipeline to test, build, and create a release for the library.

# Use the official Rust image from Docker Hub.
# It provides a Rust compiler and Cargo.
image: rust:latest

stages:
  - test
  - build
  - release

# Job to run tests.
# This runs on every commit to any branch.
test:
  stage: test
  before_script:
    # hidapi requires libudev-dev on Debian/Ubuntu based runners.
    - apt-get update -y && apt-get install -y libudev-dev
  script:
    # Run all tests in the workspace.
    - cargo test --workspace --verbose

# Job to build the release artifact.
# This also runs on every commit to ensure the project builds correctly.
build:
  stage: build
  before_script:
    - apt-get update -y && apt-get install -y libudev-dev
  script:
    # Build the project in release mode.
    - cargo build --release --workspace --verbose
  artifacts:
    # Save the compiled shared library as a job artifact.
    # This will be used by the release job.
    paths:
      - target/release/libulanzi_d200.so
    expire_in: 1 week

# Job to create a release.
# This job only runs when a new tag is pushed to the repository.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    # Run this job only for tags.
    - if: $CI_COMMIT_TAG
  script:
    - echo "Creating release for tag $CI_COMMIT_TAG"
    - |
      release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
        --description "Automated release for $CI_COMMIT_TAG" \
        --assets-link "{\"name\":\"ulanzi-d200-linux-x86_64.so\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/artifacts/${CI_COMMIT_REF_NAME}/raw/target/release/libulanzi_d200.so?job=build\"}"
  needs:
    - job: build
      artifacts: true
