stages:
  - build
  - release

variables:
  CARGO_TERM_COLOR: always

cache:
  paths:
    - target/
    - ~/.cargo/registry

# Build the release ZIP (runs on main branch or tags)
build_release:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
    - chmod +x pack.sh
  script:
    - bash pack.sh release
  artifacts:
    paths:
      - rs-ulanzi-d200-linux-release.zip
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# (Optional) Debug build for merge requests or other branches
build_debug:
  stage: build
  image: rust:latest
  before_script:
    - apt-get update -qq && apt-get install -y -qq zip
    - chmod +x pack.sh
  script:
    - bash pack.sh debug
  artifacts:
    paths:
      - rs-ulanzi-d200-linux-debug.zip
    expire_in: 1 week
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_TAG == null

# Create or update a GitLab release (overwrites if tag already exists)
create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build_release
  script:
    - |
      release-cli create \
        --name "Release $CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --description "Automated release from GitLab CI pipeline" \
        --update \
        --assets-file "rs-ulanzi-d200-linux-release.zip#Plugin ZIP"
  rules:
    - if: $CI_COMMIT_TAG